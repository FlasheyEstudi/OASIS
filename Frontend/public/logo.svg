<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="dropGrad" x1="128" y1="40" x2="384" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E8C5E"/>
      <stop offset="1" stop-color="#0A6B45"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0077B6"/>
      <stop offset="1" stop-color="#005F92"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0E8C5E"/>
      <stop offset="1" stop-color="#0077B6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0E8C5E" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBlue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main drop shape - left curve -->
  <path d="M256 56 C256 56 120 180 120 300 C120 375 178 420 256 420 C256 420 200 400 180 340 C160 280 200 160 256 56Z" 
        fill="url(#dropGrad)" filter="url(#softShadow)"/>
  
  <!-- Main drop shape - right curve (intertwined) -->
  <path d="M256 56 C256 56 392 180 392 300 C392 375 334 420 256 420 C256 420 312 400 332 340 C352 280 312 160 256 56Z" 
        fill="url(#dropGrad)" filter="url(#softShadow)"/>

  <!-- "O" negative space - subtle inner shape -->
  <ellipse cx="256" cy="280" rx="52" ry="60" fill="white" opacity="0.15"/>
  
  <!-- Inner highlight/reflection on drop -->
  <ellipse cx="210" cy="200" rx="24" ry="48" fill="white" opacity="0.18"/>
  <ellipse cx="195" cy="180" rx="12" ry="24" fill="white" opacity="0.12"/>

  <!-- Network connection lines from drop base -->
  <!-- Line to left node (clinic) -->
  <path d="M220 408 C200 430 170 440 140 448" 
        stroke="#0077B6" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Line to center-bottom node (pharmacy) -->  
  <path d="M256 420 C256 440 256 450 256 460" 
        stroke="#0077B6" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Line to right node (patient) -->
  <path d="M292 408 C312 430 342 440 372 448" 
        stroke="#0077B6" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Cross connections -->
  <path d="M140 448 C180 470 220 468 256 460" 
        stroke="#0077B6" stroke-width="1.5" stroke-linecap="round" opacity="0.3" stroke-dasharray="4 4"/>
  <path d="M372 448 C332 470 292 468 256 460" 
        stroke="#0077B6" stroke-width="1.5" stroke-linecap="round" opacity="0.3" stroke-dasharray="4 4"/>

  <!-- Left node - Clinic (green) -->
  <circle cx="140" cy="452" r="18" fill="url(#nodeGrad2)" filter="url(#glow)" opacity="0.9"/>
  <circle cx="140" cy="452" r="10" fill="white" opacity="0.2"/>
  <!-- Clinic cross icon -->
  <rect x="136" y="444" width="8" height="16" rx="2" fill="white" opacity="0.8"/>
  <rect x="132" y="448" width="16" height="8" rx="2" fill="white" opacity="0.8"/>

  <!-- Center node - Pharmacy (blue) -->
  <circle cx="256" cy="464" r="18" fill="url(#nodeGrad1)" filter="url(#glowBlue)" opacity="0.9"/>
  <circle cx="256" cy="464" r="10" fill="white" opacity="0.2"/>
  <!-- Pharmacy pill icon -->
  <rect x="248" y="460" width="16" height="8" rx="4" fill="white" opacity="0.8" transform="rotate(-45 256 464)"/>

  <!-- Right node - Patient (blue-green) -->
  <circle cx="372" cy="452" r="18" fill="url(#nodeGrad2)" filter="url(#glow)" opacity="0.9"/>
  <circle cx="372" cy="452" r="10" fill="white" opacity="0.2"/>
  <!-- Patient heart icon -->
  <path d="M364 450 C364 446 368 444 372 448 C376 444 380 446 380 450 C380 454 372 460 372 460 C372 460 364 454 364 450Z" 
        fill="white" opacity="0.8"/>
</svg>
